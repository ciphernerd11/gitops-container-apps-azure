server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── DNS Resolver ──
    # Using the K8s DNS service IP (standard is 10.0.0.10 or use the internal DNS)
    resolver kube-dns.kube-system.svc.cluster.local valid=30s;

    # ── SPA fallback ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Reverse-proxy to Alert API ──
    location /api/alerts {
        set $alert_api_backend "http://alert-api-dev-service.dev.svc.cluster.local:8080/alerts";
        proxy_pass         $alert_api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── Reverse-proxy to Resource API ──
    location /api/resources {
        set $resource_api_backend "http://resource-api-dev-service.dev.svc.cluster.local:80/resources";
        proxy_pass         $resource_api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── Health check ──
    location /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
