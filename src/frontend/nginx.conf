server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── SPA fallback ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Reverse-proxy to Alert API ──
    location /api/alerts {
        proxy_pass         http://alert-api-service:8000/alerts;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── Reverse-proxy to Resource API ──
    location /api/resources {
        proxy_pass         http://resource-api-service:3000/resources;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── Health check ──
    location /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
