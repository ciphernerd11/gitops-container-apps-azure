name: Notification Worker CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'src/notification-worker/**'
      - 'helm/values/dev-values/values-dev-notifications-worker.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'src/notification-worker/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options: [dev, qa, uat, prod]
      image_tag:
        description: 'Image tag to promote (only for qa, uat, prod)'
        required: false
        type: string

env:
  SERVICE_NAME: notifications-worker
  DEV_ACR: acrdisasterreliefdev
  TARGET_ACR: acrdisasterrelief${{ github.event.inputs.environment || 'dev' }}

jobs:
  build-push-dev:
    if: github.event.inputs.environment == 'dev' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - run: az acr login --name $DEV_ACR
      - name: Build & Push
        run: |
          TAG=$SERVICE_NAME-${GITHUB_SHA::8}
          REGISTRY=$DEV_ACR.azurecr.io
          docker build -t $REGISTRY/$SERVICE_NAME:$TAG ./src/notification-worker
          docker push $REGISTRY/$SERVICE_NAME:$TAG
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV
      
      - name: Update Dev Manifest
        run: |
          VALUES_FILE="helm/values/dev-values/values-dev-notifications-worker.yaml"
          # Use yq to update the tag field reliably
          yq -i ".image.tag = \"$IMAGE_TAG\"" $VALUES_FILE
          echo "Updated $VALUES_FILE:"
          cat $VALUES_FILE
      
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/values/dev-values/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "ci: update $SERVICE_NAME dev tag to $IMAGE_TAG [skip ci]"
          for i in {1..5}; do
            git pull --rebase origin main
            if git push origin main; then exit 0; fi
            sleep 5
          done
          exit 1

  promote-to-env:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment != 'dev'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Promote Image
        uses: ./.github/actions/promote-image
        with:
          service_name: ${{ env.SERVICE_NAME }}
          image_tag: ${{ github.event.inputs.image_tag }}
          target_env: ${{ github.event.inputs.environment }}
          target_acr: ${{ env.TARGET_ACR }}
          dev_acr: ${{ env.DEV_ACR }}

      - name: Commit & Push Promotion
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/values/
          git commit -m "ci: promote $SERVICE_NAME to ${{ github.event.inputs.environment }} with tag ${{ github.event.inputs.image_tag }} [skip ci]"
          for i in {1..5}; do
            git pull --rebase origin main
            if git push origin main; then exit 0; fi
            sleep 5
          done
          exit 1
