name: Notification Worker CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'src/notification-worker/**'
      - 'kube/notification-worker/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/notification-worker/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options: [dev, qa, uat, prod]

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  REGISTRY: ${{ secrets.ACR_NAME }}.azurecr.io
  SERVICE_NAME: notification-worker

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - run: az acr login --name $ACR_NAME
      - name: Build & Push
        run: |
          docker build -t $REGISTRY/$SERVICE_NAME:$SERVICE_NAME-${GITHUB_SHA::8} ./src/$SERVICE_NAME
          docker push $REGISTRY/$SERVICE_NAME:$SERVICE_NAME-${GITHUB_SHA::8}

  update-manifest:
    needs: build-push
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Update Tag
        run: |
          yq -i '.spec.template.spec.containers[0].image = "'$REGISTRY'/'$SERVICE_NAME':'$SERVICE_NAME'-${GITHUB_SHA::8}"' kube/$SERVICE_NAME/$SERVICE_NAME-deployment.yaml
      - name: Commit & Push
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kube/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "ci: update $SERVICE_NAME tag to ${{ github.sha }} [skip ci]"
          
          # Implementation of rebase-and-retry to handle concurrent pushes
          for i in {1..5}; do
            git pull --rebase origin main
            if git push origin main; then
              echo "Push successful"
              exit 0
            fi
            echo "Push failed, retrying in 5s... (Attempt $i)"
            sleep 5
          done
          echo "Failed to push after 5 attempts"
          exit 1
