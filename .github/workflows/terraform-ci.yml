name: Infrastructure CI/CD (Terraform)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev, qa, uat, prod)'
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
        - qa
        - uat
        - prod
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/**'

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}

jobs:
  terraform-plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infrastructure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: |
          ENV_NAME="${{ github.event.inputs.environment || 'dev' }}"
          terraform init -backend-config="key=${ENV_NAME}.tfstate"

      - name: Get Public IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Pre-Whitelist Runner IP (if Vault exists)
        run: |
          if az keyvault show --name "kv-disasterreliefdev" &>/dev/null; then
            az keyvault network-rule add --name "kv-disasterreliefdev" --ip-address "${{ steps.ip.outputs.ipv4 }}"
            sleep 10
          else
            echo "Key Vault 'kv-disasterreliefdev' not found. Skipping whitelisting."
          fi

      - name: Terraform Plan
        id: plan
        run: |
          ENV_NAME="${{ github.event.inputs.environment || 'dev' }}"
          terraform plan -var-file="environments/$ENV_NAME.tfvars" -var="allowed_ips=[\"${{ steps.ip.outputs.ipv4 }}\"]" -no-color

  terraform-apply:
    name: 'Terraform Apply'
    needs: terraform-plan
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    defaults:
      run:
        working-directory: ./infrastructure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: |
          ENV_NAME="${{ github.event.inputs.environment || 'dev' }}"
          terraform init -backend-config="key=${ENV_NAME}.tfstate"

      - name: Get Public IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Pre-Whitelist Runner IP (if Vault exists)
        run: |
          if az keyvault show --name "kv-disasterreliefdev" &>/dev/null; then
            az keyvault network-rule add --name "kv-disasterreliefdev" --ip-address "${{ steps.ip.outputs.ipv4 }}"
            sleep 10
          else
            echo "Key Vault 'kv-disasterreliefdev' not found. Skipping whitelisting."
          fi

      - name: Terraform Apply
        run: terraform apply -var-file="environments/${{ github.event.inputs.environment }}.tfvars" -var="allowed_ips=[\"${{ steps.ip.outputs.ipv4 }}\"]" -auto-approve -input=false

  trigger-apps:
    name: 'Trigger Applications'
    needs: terraform-apply
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger App Workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          workflows=("frontend-ci.yml" "alert-api-ci.yml" "resource-api-ci.yml" "notification-worker-ci.yml" "alert-generator-ci.yml")
          for workflow in "${workflows[@]}"; do
            echo "Triggering $workflow..."
            gh workflow run "$workflow" --repo ${{ github.repository }} --ref main -f environment=${{ github.event.inputs.environment }}
          done
