name: Infrastructure CI/CD (Terraform)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy (dev, qa, uat, prod)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - uat
          - prod
  pull_request:
    branches: [main]
    paths:
      - "infrastructure/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}

jobs:
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infrastructure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Get Public IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Terraform Init
        run: |
          ENV_NAME="${{ github.event.inputs.environment || 'dev' }}"
          terraform init -backend-config="key=${ENV_NAME}.tfstate"

      - name: Pre-Whitelist Runner IP (if Vault exists)
        run: |
          ENV_NAME="${{ github.event.inputs.environment || 'dev' }}"
          KV_NAME="kv-disasterrelief${ENV_NAME}"
          if az keyvault show --name "$KV_NAME" &>/dev/null; then
            echo "Whitelisting IP ${{ steps.ip.outputs.ipv4 }} on $KV_NAME..."
            az keyvault network-rule add --name "$KV_NAME" --ip-address "${{ steps.ip.outputs.ipv4 }}"
            echo "Waiting 60s for Azure Firewall propagation..."
            sleep 60
          else
            echo "Key Vault '$KV_NAME' not found. This might be a fresh infra creation."
          fi

      - name: Terraform Plan
        id: plan
        run: |
          ENV_NAME="${{ github.event.inputs.environment || 'dev' }}"
          terraform plan -var-file="environments/$ENV_NAME.tfvars" -var="allowed_ips=[\"${{ steps.ip.outputs.ipv4 }}\"]" -no-color

      - name: Cleanup Whitelist
        if: always()
        run: |
          ENV_NAME="${{ github.event.inputs.environment || 'dev' }}"
          KV_NAME="kv-disasterrelief${ENV_NAME}"
          az keyvault network-rule remove --name "$KV_NAME" --ip-address "${{ steps.ip.outputs.ipv4 }}" || true

  terraform-apply:
    name: "Terraform Apply"
    needs: terraform-plan
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    defaults:
      run:
        working-directory: ./infrastructure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Get Public IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      - name: Terraform Init
        run: |
          ENV_NAME="${{ github.event.inputs.environment || 'dev' }}"
          terraform init -backend-config="key=${ENV_NAME}.tfstate"

      - name: Pre-Whitelist Runner IP (if Vault exists)
        run: |
          ENV_NAME="${{ github.event.inputs.environment || 'dev' }}"
          KV_NAME="kv-disasterrelief${ENV_NAME}"
          if az keyvault show --name "$KV_NAME" &>/dev/null; then
            echo "Whitelisting IP ${{ steps.ip.outputs.ipv4 }} on $KV_NAME..."
            az keyvault network-rule add --name "$KV_NAME" --ip-address "${{ steps.ip.outputs.ipv4 }}"
            echo "Waiting 60s for Azure Firewall propagation..."
            sleep 60
          else
            echo "Key Vault '$KV_NAME' not found."
          fi

      - name: Terraform Apply
        run: terraform apply -var-file="environments/${{ github.event.inputs.environment }}.tfvars" -var="allowed_ips=[\"${{ steps.ip.outputs.ipv4 }}\"]" -auto-approve -input=false

      - name: Get AKS Credentials
        run: |
          RG_NAME=$(terraform output -raw resource_group_name)
          AKS_NAME=$(terraform output -raw aks_cluster_name)
          az aks get-credentials --resource-group "$RG_NAME" --name "$AKS_NAME" --overwrite-existing

      - name: Apply ArgoCD Applications
        run: |
          ENV_NAME="${{ github.event.inputs.environment || 'dev' }}"
          kubectl apply -f ../argocd/$ENV_NAME/
      - name: Cleanup Whitelist
        if: always()
        run: |
          ENV_NAME="${{ github.event.inputs.environment || 'dev' }}"
          KV_NAME="kv-disasterrelief${ENV_NAME}"
          az keyvault network-rule remove --name "$KV_NAME" --ip-address "${{ steps.ip.outputs.ipv4 }}" || true

