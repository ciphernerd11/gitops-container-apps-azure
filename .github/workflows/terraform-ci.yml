name: Infrastructure CI/CD (Terraform)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev, qa, uat, prod)'
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
        - qa
        - uat
        - prod
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/**'

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infrastructure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          # Use the environment input for manual runs, or default to dev for pull requests
          ENV_NAME="${{ github.event.inputs.environment || 'dev' }}"
          echo "Planning for environment: $ENV_NAME"
          terraform plan -var-file="environments/$ENV_NAME.tfvars" -no-color

      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch'
        run: terraform apply -var-file="environments/${{ github.event.inputs.environment }}.tfvars" -auto-approve -input=false
