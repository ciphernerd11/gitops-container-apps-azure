name: GitOps CI/CD using ArgoCD

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'kube/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - uat
          - prod

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  REGISTRY: ${{ secrets.ACR_NAME }}.azurecr.io

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build & Push Images
        run: |
          for svc in frontend alert-api resource-api notification-worker alert-generator; do
            docker build -t $REGISTRY/$svc:${{ github.sha }} ./src/$svc
            docker push $REGISTRY/$svc:${{ github.sha }}
          done

  update-manifests:
    needs: build-images
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}  # Only 'prod' will trigger approval if configured
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tags in kube/ manifests
        run: |
          TAG="${{ github.sha }}"
          for svc in frontend alert-api resource-api notification-worker alert-generator; do
            if [ "$svc" == "alert-generator" ]; then
                yq -i '.spec.jobTemplate.spec.template.spec.containers[0].image = "'$REGISTRY'/'$svc':'$TAG'"' kube/alert-generator-cronjob.yaml
            else
                yq -i '.spec.template.spec.containers[0].image = "'$REGISTRY'/'$svc':'$TAG'"' kube/$svc-deployment.yaml
            fi
          done

      - name: Commit & push updated manifests
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kube/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: update image tags to ${{ github.sha }} [skip ci]"
          git push
