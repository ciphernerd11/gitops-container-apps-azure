name: Alert API CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'src/alert-api/**'
      - 'helm/values/dev-values/values-dev-alert-api.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'src/alert-api/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options: [dev, qa, uat, prod]
      image_tag:
        description: 'Image tag to promote (only for qa, uat, prod)'
        required: false
        type: string

env:
  SERVICE_NAME: alert-api
  DEV_ACR: acrdisasterreliefdev
  TARGET_ACR: acrdisasterrelief${{ github.event.inputs.environment || 'dev' }}

jobs:
  build-push-dev:
    if: github.event.inputs.environment == 'dev' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - run: az acr login --name $DEV_ACR
      - name: Build & Push
        run: |
          TAG=$SERVICE_NAME-${GITHUB_SHA::8}
          REGISTRY=$DEV_ACR.azurecr.io
          docker build -t $REGISTRY/$SERVICE_NAME:$TAG ./src/$SERVICE_NAME
          docker push $REGISTRY/$SERVICE_NAME:$TAG
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV
      
      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: ${{ env.DEV_ACR }}
          containerAppName: ${{ env.SERVICE_NAME }}
          resourceGroup: rg-disaster-relief-dev
          imageToDeploy: ${{ env.DEV_ACR }}.azurecr.io/${{ env.SERVICE_NAME }}:${{ env.IMAGE_TAG }}

  promote-to-env:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment != 'dev'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Promote Image
        uses: ./.github/actions/promote-image
        with:
          service_name: ${{ env.SERVICE_NAME }}
          image_tag: ${{ github.event.inputs.image_tag }}
          target_env: ${{ github.event.inputs.environment }}
          target_acr: ${{ env.TARGET_ACR }}
          dev_acr: ${{ env.DEV_ACR }}

      - name: Commit & Push Promotion
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/values/
          git commit -m "ci: promote $SERVICE_NAME to ${{ github.event.inputs.environment }} with tag ${{ github.event.inputs.image_tag }} [skip ci]"
          for i in {1..5}; do
            git pull --rebase origin main
            if git push origin main; then exit 0; fi
            sleep 5
          done
          exit 1
