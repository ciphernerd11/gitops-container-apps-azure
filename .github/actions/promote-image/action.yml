name: 'Promote Image'
description: 'Promotes a Docker image from dev ACR to environment-specific ACR and updates Kustomize manifests'
inputs:
  service_name:
    description: 'Name of the service'
    required: true
  image_tag:
    description: 'The image tag to promote (from dev ACR)'
    required: true
  target_env:
    description: 'Target environment (qa, uat, prod)'
    required: true
  target_acr:
    description: 'Target ACR name'
    required: true
  dev_acr:
    description: 'Dev ACR name'
    required: true
    default: 'acrdisasterreliefdev'

runs:
  using: "composite"
  steps:
    - name: Azure Login Check
      shell: pwsh
      run: |
        if (-not (az account show)) {
          Write-Error "Not logged into Azure. Please run azure/login first."
          exit 1
        }

    - name: Import Image to Target ACR
      shell: pwsh
      run: |
        $sourceImage = "${{ inputs.dev_acr }}.azurecr.io/${{ inputs.service_name }}:${{ inputs.image_tag }}"
        $targetImage = "${{ inputs.service_name }}:${{ inputs.image_tag }}"
        Write-Host "Promoting $sourceImage to ${{ inputs.target_acr }}..."
        
        az acr import `
          --name ${{ inputs.target_acr }} `
          --source $sourceImage `
          --image $targetImage `
          --force

    - name: Update Helm Tag
      shell: pwsh
      run: |
        $targetEnv = "${{ inputs.target_env }}"
        $serviceName = "${{ inputs.service_name }}"
        $imageTag = "${{ inputs.image_tag }}"
        $targetRegistry = "${{ inputs.target_acr }}.azurecr.io"
        
        # Determine the values file path
        $valuesFile = "helm/values/$targetEnv-values/values-$targetEnv-$serviceName.yaml"
        
        Write-Host "Updating Helm values in $valuesFile..."
        
        if (-not (Test-Path $valuesFile)) {
            if ($serviceName -eq "notification-worker") {
                $valuesFile = "helm/values/$targetEnv-values/values-$targetEnv-notifications-worker.yaml"
            }
        }
        
        if (Test-Path $valuesFile) {
            # Update the tag with quotes for safety
            (Get-Content $valuesFile) -replace '( *tag: ).*', "`$1`"$imageTag`"" | Set-Content $valuesFile
            
            # Update the repository registry
            (Get-Content $valuesFile) -replace '( *repository: ).*/(.*)', "`$1$targetRegistry/`$2" | Set-Content $valuesFile
            
            Write-Host "Updated content of $valuesFile:"
            Get-Content $valuesFile
        } else {
            Write-Error "Values file not found: $valuesFile"
            exit 1
        }
