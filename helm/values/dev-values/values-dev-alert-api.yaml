kind: Deployment
partOf: disaster-relief

replicaCount: 1

image:
  repository: acrdisasterreliefdev.azurecr.io/alert-api
  tag: alert-api-5c22437e

ports:
  - containerPort: 8000
    servicePort: 8080
    name: http

service:
  enabled: true
ingress:
  enabled: false

env:
  - name: REDIS_HOST
    value: "redis-service"
  - name: REDIS_PORT
    value: "6379"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
  