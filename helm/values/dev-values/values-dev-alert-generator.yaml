kind: CronJob
partOf: disaster-relief
schedule: "*/1 * * * *"
concurrencyPolicy: Replace
failedJobsHistoryLimit: 1
image:
  repository: acrdisasterreliefdev.azurecr.io/alert-generator
  tag: alert-generator-04573d24
service:
  enabled: false
ingress:
  enabled: false
env:
  - name: API_URL
    value: "http://alert-api-service:8000/alerts"
resources:
  requests:
    cpu: 500m
    memory: 32Mi
  limits:
    cpu: 500m
    memory: 64Mi
