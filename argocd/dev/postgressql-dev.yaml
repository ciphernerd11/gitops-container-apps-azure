apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: disaster-relief
spec:
  project: default
  source:
    repoURL: https://github.com/ciphernerd11/gitops-container-apps-azure.git
    targetRevision: main
    path: kube/dev/postgressql/
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # syncOptions:
    #   - CreateNamespace=true
