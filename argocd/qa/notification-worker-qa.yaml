apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notification-worker-qa
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: disaster-relief
spec:
  project: default
  source:
    repoURL: https://github.com/ciphernerd11/gitops-container-apps-azure.git
    targetRevision: main
    path: helm/microservices
    helm:
      valueFiles:
        - ../../helm/values/qa-values/values-qa-notifications-worker.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: qa
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
