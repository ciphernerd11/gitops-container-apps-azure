apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-api
  labels:
    app.kubernetes.io/name: resource-api
    app.kubernetes.io/part-of: disaster-relief
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: resource-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: resource-api
        app.kubernetes.io/part-of: disaster-relief
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: resource-api
          image: acrdisasterreliefdev.azurecr.io/resource-api:bd554c6c152078a0705221b99023cfc68164c045
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: PGHOST
              value: postgres-service
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: postgres
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATABASE
              value: resources
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "postgres-kv-sync"
---
apiVersion: v1
kind: Service
metadata:
  name: resource-api-service
  labels:
    app.kubernetes.io/name: resource-api
    app.kubernetes.io/part-of: disaster-relief
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: resource-api
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
  template:
    spec:
      containers:
        - image: acrdisasterreliefdev.azurecr.io/resource-api:bd554c6c152078a0705221b99023cfc68164c045
