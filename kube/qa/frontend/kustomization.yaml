apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: qa

resources:
- ../../base/frontend
- ../common

patches:
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: qa.disaster-relief.com
    - op: replace
      path: /spec/tls/0/hosts/0
      value: qa.disaster-relief.com
  target:
    kind: Ingress
    name: frontend-ingress
images:
- name: acrdisasterreliefdev.azurecr.io/frontend
  newName: acrdisasterreliefqa.azurecr.io/frontend
  newTag: latest
