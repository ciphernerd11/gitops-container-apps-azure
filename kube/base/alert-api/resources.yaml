apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-api
  labels:
    app.kubernetes.io/name: alert-api
    app.kubernetes.io/part-of: disaster-relief
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alert-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alert-api
        app.kubernetes.io/part-of: disaster-relief
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: alert-api
          image: acrdisasterreliefdev.azurecr.io/alert-api:stable
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: REDIS_HOST
              value: redis-service
            - name: REDIS_PORT
              value: "6379"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alert-api-ingress
  annotations:
    appgw.ingress.kubernetes.io/backend-path-prefix: "/alerts"
spec:
  ingressClassName: azure-application-gateway
  tls:
    - hosts:
        - disaster-relief.com
      secretName: disaster-relief-tls
  rules:
    - host: disaster-relief.com
      http:
        paths:
          - path: /api/alerts
            pathType: Prefix
            backend:
              service:
                name: alert-api-service
                port:
                  number: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: alert-api-service
  labels:
    app.kubernetes.io/name: alert-api
    app.kubernetes.io/part-of: disaster-relief
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: alert-api
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
