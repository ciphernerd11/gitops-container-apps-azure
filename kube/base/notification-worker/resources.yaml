apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-worker
  labels:
    app.kubernetes.io/name: notification-worker
    app.kubernetes.io/part-of: disaster-relief
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: notification-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notification-worker
        app.kubernetes.io/part-of: disaster-relief
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: notification-worker
          image: acrdisasterreliefdev.azurecr.io/notification-worker:stable
          livenessProbe:
            exec:
              command:
                - pidof
                - notification-worker
            initialDelaySeconds: 10
            periodSeconds: 15
          env:
            - name: ALERT_API_URL
              value: http://alert-api-service:8000
            - name: POLL_INTERVAL
              value: "10s"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
