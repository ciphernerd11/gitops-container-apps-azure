apiVersion: batch/v1
kind: CronJob
metadata:
  name: alert-generator
  labels:
    app.kubernetes.io/name: alert-generator
    app.kubernetes.io/part-of: disaster-relief
    app.kubernetes.io/component: generator
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: alert-generator
            app.kubernetes.io/part-of: disaster-relief
        spec:
          containers:
            - name: alert-generator
              image: acrdisasterreliefdev.azurecr.io/alert-generator:stable
              resources:
                requests:
                  cpu: 50m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
              env:
                - name: API_URL
                  value: "http://alert-api-service:8000/alerts"
          restartPolicy: OnFailure

