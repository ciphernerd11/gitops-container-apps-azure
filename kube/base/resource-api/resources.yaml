apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-api
  labels:
    app.kubernetes.io/name: resource-api
    app.kubernetes.io/part-of: disaster-relief
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: resource-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: resource-api
        app.kubernetes.io/part-of: disaster-relief
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: resource-api
          image: acrdisasterreliefdev.azurecr.io/resource-api:stable
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: PGHOST
              value: postgres-service
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: postgres
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATABASE
              value: resources
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes: []
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: resource-api-ingress
  annotations:
    appgw.ingress.kubernetes.io/backend-path-prefix: "/resources"
spec:
  ingressClassName: azure-application-gateway
  tls:
    - hosts:
        - disaster-relief.com
      secretName: disaster-relief-tls
  rules:
    - host: disaster-relief.com
      http:
        paths:
          - path: /api/resources
            pathType: Prefix
            backend:
              service:
                name: resource-api-service
                port:
                  number: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: resource-api-service
  labels:
    app.kubernetes.io/name: resource-api
    app.kubernetes.io/part-of: disaster-relief
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: resource-api
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
