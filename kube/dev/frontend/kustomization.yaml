apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dev

resources:
- ../../base/frontend
#- ../common

patches:
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: dev.disaster-relief.com
    - op: replace
      path: /spec/tls/0/hosts/0
      value: dev.disaster-relief.com
  target:
    kind: Ingress
    name: frontend-ingress
images:
- name: acrdisasterreliefdev.azurecr.io/frontend
  newName: acrdisasterreliefdev.azurecr.io/frontend
  newTag: frontend-6b5d3f0b
