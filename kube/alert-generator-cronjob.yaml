apiVersion: batch/v1
kind: CronJob
metadata:
  name: alert-generator
spec:
  schedule: "*/1 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: alert-generator
              image: acrdisasterreliefdev.azurecr.io/alert-generator:ceadc7d482069b48eca339c48dc4f5602017f2c3
              env:
                - name: API_URL
                  value: "http://alert-api-service:8000/alerts"
          restartPolicy: OnFailure
