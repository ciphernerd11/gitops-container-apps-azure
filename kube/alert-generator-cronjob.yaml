apiVersion: batch/v1
kind: CronJob
metadata:
  name: alert-generator
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: alert-generator
              image: acrdisasterreliefdev.azurecr.io/alert-generator:74691659c9f8a84e117c0b15f02482a80be9d1c7
              env:
                - name: API_URL
                  value: "http://alert-api-service:8000/alerts"
          restartPolicy: OnFailure
