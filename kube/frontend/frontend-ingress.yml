apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  annotations:
    # AGIC uses ingressClassName instead of the annotation in newer versions
spec:
  ingressClassName: azure-application-gateway

  tls:
    - hosts:
        - disaster-relief.com
      secretName: disaster-relief-tls

  rules:
    - host: disaster-relief.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
